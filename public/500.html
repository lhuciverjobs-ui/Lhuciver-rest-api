<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>500 Server Error</title>
    <meta name="theme-color" content="#26313d">
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2f5;
        --card: rgba(255,255,255,0.9);
        --line: rgba(15,23,42,0.1);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #0b0d10;
        --mono: "Cascadia Code", "JetBrains Mono", ui-monospace, monospace;
        --display: "Arial Black", "Segoe UI Black", Impact, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.94), transparent 32%),
          radial-gradient(circle at bottom right, rgba(15,23,42,0.08), transparent 28%),
          linear-gradient(135deg, #edf2f7 0%, #f8fafc 42%, #e2e8f0 100%);
        color: var(--text);
        display: grid;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        place-items: center;
      }
      .card {
        background: var(--card);
        backdrop-filter: blur(16px);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 28px 80px rgba(15,23,42,0.12);
        max-width: 700px;
        text-align: center;
        padding: 34px 30px;
        width: 100%;
      }
      .kicker {
        color: var(--muted);
        display: block;
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.28em;
        margin-bottom: 16px;
        text-transform: uppercase;
      }
      h1 {
        font-family: var(--display);
        font-size: clamp(54px, 13vw, 110px);
        letter-spacing: -0.08em;
        line-height: 0.86;
        margin: 0;
        text-transform: uppercase;
      }
      p {
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
        margin: 18px 0 0;
        margin-left: auto;
        margin-right: auto;
        max-width: 38ch;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 24px;
      }
      a {
        align-items: center;
        border-radius: 14px;
        display: inline-flex;
        font-weight: 800;
        height: 48px;
        justify-content: center;
        min-width: 180px;
        padding: 0 18px;
        text-decoration: none;
      }
      .primary {
        background: var(--accent);
        color: #fff;
      }
      .secondary {
        background: #fff;
        border: 1px solid var(--line);
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="kicker">Lhuciver Restapis</span>
      <h1>500</h1>
      <p>Terjadi masalah di server saat memproses halaman ini. Coba refresh lagi atau kembali ke dashboard utama.</p>
      <div class="actions">
        <a class="primary" href="/">Kembali ke Dashboard</a>
        <a class="secondary" href="/auth">Buka Login</a>
      </div>
    </main>
  </body>
</html>
