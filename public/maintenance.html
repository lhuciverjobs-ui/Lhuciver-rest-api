<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Maintenance Mode</title>
    <style>
      body {
        align-items: center;
        background: linear-gradient(135deg, #0f172a 0%, #111827 40%, #1f2937 100%);
        color: #f8fafc;
        display: grid;
        font-family: "Segoe UI", system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      .card {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        max-width: 560px;
        padding: 32px;
        width: 100%;
      }

      p {
        color: #cbd5e1;
        line-height: 1.7;
        margin: 12px 0 0;
      }

      h1 {
        font-size: clamp(34px, 6vw, 56px);
        line-height: 0.95;
        margin: 0;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Maintenance Mode</h1>
      <p>Web sedang dimatikan sementara oleh admin. Silakan coba lagi beberapa saat.</p>
      <p>Route admin tetap aktif supaya pengelolaan user, API key, credit, dan setting bisa lanjut dari panel kontrol.</p>
    </div>
  </body>
</html>
